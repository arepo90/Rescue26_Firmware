; PlatformIO Project Configuration File
; Rescue Robot Firmware — ESP32 DOIT DevKit V1

[env:esp32doit-devkit-v1]
platform  = espressif32
board     = esp32doit-devkit-v1
framework = arduino

; Run both cores at full 240 MHz
board_build.f_cpu = 240000000L

monitor_speed  = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
    adafruit/Adafruit LIS3MDL @ ^1.1.3
    adafruit/Adafruit MLX90640 @ ^1.1.1
    adafruit/Adafruit BusIO @ ^1.14.1
    adafruit/Adafruit Unified Sensor @ ^1.1.9
    autowp/autowp-mcp2515 @ ^1.0.1     ; SPI-CAN transceiver (MCP2515 assumed)

; expose project include/ dir to all library builds
build_flags =
    -I"${PROJECT_INCLUDE_DIR}"
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM=0